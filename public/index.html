<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዘመናዊ ማከፋፈያ ሱቅ</title>
    <!-- የቴሌግራም ዌብ አፕ ጃቫስክሪፕት ኤስዲኬ -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 15px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; text-align: center; }
        h2 { color: #0088cc; margin-top: 0; }
        .price-btn { background: #0088cc; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .price-btn:active { background: #006699; }
        .status { margin-top: 15px; font-weight: bold; color: green; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛍️ ዘመናዊ ማከፋፈያ ሱቅ</h2>
        <p>እንኳን በደህና መጡ! ከታች ያለውን አዝራር በመጫን የሙከራ ትዕዛዝ ማቅረብ ይችላሉ።</p>
    </div>

    <div class="card">
        <h3>📦 ናሙና እቃ (Sample Item)</h3>
        <p>ዋጋ፦ <strong>2,500 ብር</strong></p>
        <button class="price-btn" onclick="sendOrder(2500)">🛒 አሁን እዘዝ</button>
        <div id="status-msg" class="status"></div>
    </div>

    <script>
        // የቴሌግራም ዌብ አፕን ማስጀመር
        const tg = window.Telegram.WebApp;
        tg.expand(); // ገጹን ሙሉ ስክሪን ማድረግ

        // የተጠቃሚውን ስም ከቴሌግራም መውሰድ (ካለ)
        const user = tg.initDataUnsafe?.user;
        const customerName = user ? `${user.first_name} ${user.last_name || ''}` : "የዌብ አፕ ደንበኛ";

        async function sendOrder(amount) {
            const statusDiv = document.getElementById("status-msg");
            statusDiv.innerText = "⏳ ትዕዛዝዎ እየተላከ ነው...";
            
            try {
                // በራሳችን ቨርሰል ላይ ወደሰራነው API መላክ
                const response = await fetch('/api/place-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: amount,
                        customer_name: customerName
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    statusDiv.innerHTML = "✅ " + result.message;
                    // ለጥቂት ሰከንድ አሳይቶ ዌብ አፑን በራሱ መዝጋት
                    setTimeout(() => { tg.close(); }, 2000);
                } else {
                    statusDiv.innerHTML = "❌ ስህተት፦ " + result.error;
                }
            } catch (error) {
                statusDiv.innerHTML = "❌ ከሰርቨር ጋር መገናኘት አልተቻለም!";
            }
        }
    </script>
</body>
</html>
