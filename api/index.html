<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ስማርት ሱቅ መግቢያ በር</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-slate-900 font-sans p-4 min-h-screen flex items-center justify-center text-slate-100">

    <div class="w-full max-w-md bg-slate-800/80 backdrop-blur-md rounded-3xl shadow-2xl p-6 border border-slate-700/50 space-y-6">
        
        <div id="portal-screen" class="space-y-6 text-center py-4">
            <div class="space-y-2">
                <div class="text-4xl">✨</div>
                <h2 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">እንኳን ወደ ስማርት ሱቅ መጡ!</h2>
                <p class="text-xs text-slate-400">እባክዎ መተግበሪያውን የሚጠቀሙበትን ሚና ይምረጡ</p>
            </div>

            <div class="grid grid-cols-1 gap-4 pt-4">
                <button onclick="enterAsRole('shop')" class="group relative overflow-hidden bg-gradient-to-br from-indigo-600 to-blue-700 p-5 rounded-2xl text-left shadow-lg shadow-indigo-900/40 transform active:scale-98 transition duration-200 cursor-pointer">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg text-white">🏢 እኔ ባለሱቅ ነኝ</h3>
                            <p class="text-xs text-indigo-200/80 mt-1">ምርት ለመመዝገብ፣ ማከማቻ ለመቆጣጠርና ሂሳብ ለማየት</p>
                        </div>
                        <span class="text-xl group-hover:translate-x-1 transition duration-200">➡️</span>
                    </div>
                </button>

                <button onclick="enterAsRole('customer')" class="group relative overflow-hidden bg-slate-700 hover:bg-slate-650 p-5 rounded-2xl text-left shadow-md border border-slate-600 transform active:scale-98 transition duration-200 cursor-pointer">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg text-slate-200">🛍️ እኔ ደንበኛ ነኝ</h3>
                            <p class="text-xs text-slate-400 mt-1">ዕቃዎችን ከነዋጋቸው መርጦ በቀጥታ ለማዘዝ</p>
                        </div>
                        <span class="text-xl group-hover:translate-x-1 transition duration-200">➡️</span>
                    </div>
                </button>
            </div>
        </div>

        <div id="shop-screen" class="hidden space-y-6 text-slate-800 animate-fade-in">
            
            <button onclick="backToPortal()" class="text-xs font-bold text-slate-400 hover:text-slate-200 flex items-center gap-1 cursor-pointer">⬅️ ወደ መግቢያ በር ተመለስ</button>

            <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
                <label class="block text-xs font-bold text-amber-800 uppercase tracking-wider">የሱቅዎ / የማከፋፈያዎ ስም</label>
                <input type="text" id="global_shop_name" placeholder="ለምሳሌ፦ አቤል ሸቀጣሸቀጥ" class="w-full mt-1 p-2.5 border border-amber-300 rounded-xl outline-none bg-white text-sm font-semibold shadow-sm">
            </div>

            <div class="flex bg-slate-100 p-1 rounded-xl text-xs font-bold">
                <button onclick="switchTab('product-tab')" id="btn-product-tab" class="tab-btn flex-1 py-2 rounded-lg text-center bg-white text-slate-800 shadow-sm cursor-pointer">📦 መዝግብ</button>
                <button onclick="switchTab('transfer-tab')" id="btn-transfer-tab" class="tab-btn flex-1 py-2 rounded-lg text-center text-slate-600 cursor-pointer">⛨ አዛውር</button>
                <button onclick="switchTab('credit-tab')" id="btn-credit-tab" class="tab-btn flex-1 py-2 rounded-lg text-center text-slate-600 cursor-pointer">📝 ዱቤ</button>
                <button onclick="switchTab('finance-tab')" id="btn-finance-tab" class="tab-btn flex-1 py-2 rounded-lg text-center text-slate-600 cursor-pointer">💰 ሂሳብ</button>
            </div>

            <div class="bg-white rounded-2xl p-4 border border-slate-100 min-h-[280px]">
                <div id="product-tab" class="tab-content space-y-3">
                    <h4 class="text-xs font-bold text-slate-500 uppercase">📦 አዲስ ምርት መመዝገቢያ</h4>
                    <form id="productForm" class="space-y-3">
                        <input type="text" id="p_name" placeholder="የምርት ስም" required class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="p_qty" placeholder="ብዛት" required class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                            <input type="text" id="p_barcode" placeholder="ባርኮድ (ለመቃኘት ይንኩ)" class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" step="0.01" id="p_buying" placeholder="የመግዣ ዋጋ" required class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                            <input type="number" step="0.01" id="p_selling" placeholder="የመሸጫ ዋጋ" required class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        </div>
                        <input type="date" id="p_expiry" required class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50 text-slate-400">
                        <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl text-sm shadow-md hover:bg-slate-800 active:scale-99 transition cursor-pointer">💾 አስቀምጥ</button>
                    </form>
                </div>

                <div id="transfer-tab" class="tab-content hidden space-y-3">
                    <h4 class="text-xs font-bold text-slate-500 uppercase">⛨ ወደ መደርደሪያ ማዛወሪያ</h4>
                    <form id="transferForm" class="space-y-3">
                        <input type="text" id="t_name" placeholder="የምርት ስም" required class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        <input type="number" id="t_qty" placeholder="የሚዛወር ብዛት" required class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl text-sm shadow-md hover:bg-indigo-500 active:scale-99 transition cursor-pointer">🔄 ማዛወር ፈጽም</button>
                    </form>
                </div>

                <div id="credit-tab" class="tab-content hidden space-y-3">
                    <h4 class="text-xs font-bold text-slate-500 uppercase">📝 የደንበኛ ዱቤ መመዝገቢያ</h4>
                    <form id="creditForm" class="space-y-3">
                        <input type="text" id="c_name" placeholder="የደንበኛ ሙሉ ስም" required class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        <input type="number" step="0.01" id="c_debt" placeholder="የዕዳ መጠን (በብር)" required class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        <input type="tel" id="c_phone" placeholder="የስልክ ቁጥር" class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        <button type="submit" class="w-full bg-rose-600 text-white font-bold py-3 rounded-xl text-sm shadow-md hover:bg-rose-500 active:scale-99 transition cursor-pointer">📌 ዱቤ መዝግብ</button>
                    </form>
                </div>

                <div id="finance-tab" class="tab-content hidden space-y-3">
                    <h4 class="text-xs font-bold text-slate-500 uppercase">💰 የዕለት ገቢ እና ወጪ</h4>
                    <form id="financeForm" class="space-y-3">
                        <select id="f_type" class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                            <option value="income">📥 ገቢ (Income)</option>
                            <option value="expense">📤 ወጪ (Expense)</option>
                        </select>
                        <input type="number" step="0.01" id="f_amount" placeholder="የገንዘብ መጠን" required class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        <input type="text" id="f_desc" placeholder="ዝርዝር መግለጫ" required class="w-full p-2.5 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl text-sm shadow-md hover:bg-emerald-500 active:scale-99 transition cursor-pointer">📊 ሂሳብ መዝግብ</button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const shopInput = document.getElementById('global_shop_name');
        
        if(localStorage.getItem('saved_shop_name')) {
            shopInput.value = localStorage.getItem('saved_shop_name');
        } else {
            shopInput.value = ""; 
        }

        shopInput.addEventListener('input', () => {
            localStorage.setItem('saved_shop_name', shopInput.value);
        });

        function getShopName() {
            return shopInput.value.trim() || "የሰፈር ውጥ ሱቅ";
        }

        // 🔗 ROLE SWITCHER LOGIC
        function enterAsRole(role) {
            if (role === 'shop') {
                document.getElementById('portal-screen').classList.add('hidden');
                const mainBox = document.querySelector('.max-w-md');
                mainBox.classList.remove('bg-slate-800/80', 'text-slate-100');
                mainBox.classList.add('bg-white', 'text-slate-800');
                document.getElementById('shop-screen').classList.remove('hidden');
            } else if (role === 'customer') {
                // ደንበኛ ከሆነ ቀጥታ ወደ ደንበኛው ማዘዣ ገጽ ይመራዋል
                const currentShop = getShopName() || "የሰፈር_ውጥ_ሱቅ";
                window.location.href = `/customer?shop=${encodeURIComponent(currentShop)}`;
            }
        }

        function backToPortal() {
            document.getElementById('shop-screen').classList.add('hidden');
            const mainBox = document.querySelector('.max-w-md');
            mainBox.classList.remove('bg-white', 'text-slate-800');
            mainBox.classList.add('bg-slate-800/80', 'text-slate-100');
            document.getElementById('portal-screen').classList.remove('hidden');
        }

        // TAB SWITCHER FUNCTION
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
                el.classList.add('text-slate-600');
            });
            
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.classList.remove('text-slate-600');
            activeBtn.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
        }

        // 📷 BARCODE SCANNER
        const barcodeInput = document.getElementById('p_barcode');
        barcodeInput.addEventListener('click', () => {
            if (tg.showScanQrPopup) {
                tg.showScanQrPopup({ text: "እባክዎ የምርቱን ባርኮድ ያንብቡ" }, function(text) {
                    barcodeInput.value = text;
                    tg.closeScanQrPopup();
                    return true;
                });
            }
        });

        // SUBMIT FORMS (PRODUCT, TRANSFER, CREDIT, FINANCE)
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('p_name').value,
                quantity: parseInt(document.getElementById('p_qty').value),
                barcode: document.getElementById('p_barcode').value || null,
                buying_price: parseFloat(document.getElementById('p_buying').value),
                selling_price: parseFloat(document.getElementById('p_selling').value),
                expiry_date: document.getElementById('p_expiry').value,
                shop_name: getShopName()
            };
            await sendData('/api/products', data, "ምርቱ በተሳካ ሁኔታ ተመዝግቧል!");
            document.getElementById('productForm').reset();
        });

        document.getElementById('transferForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                product_name: document.getElementById('t_name').value,
                quantity: parseInt(document.getElementById('t_qty').value),
                shop_name: getShopName()
            };
            await sendData('/api/transfer', data, "ዕቃው ወደ መደርደሪያ ተዛውሯል!");
            document.getElementById('transferForm').reset();
        });

        document.getElementById('creditForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                customer_name: document.getElementById('c_name').value,
                total_debt: parseFloat(document.getElementById('c_debt').value),
                phone_number: document.getElementById('c_phone').value || null,
                shop_name: getShopName()
            };
            await sendData('/api/credit', data, "የዱቤ ዕዳው ተመዝግቧል!");
            document.getElementById('creditForm').reset();
        });

        document.getElementById('financeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                type: document.getElementById('f_type').value,
                amount: parseFloat(document.getElementById('f_amount').value),
                description: document.getElementById('f_desc').value,
                shop_name: getShopName()
            };
            await sendData('/api/finance', data, "የሂሳብ መዝገቡ ጸድቋል!");
            document.getElementById('financeForm').reset();
        });

        async function sendData(endpoint, payload, successMessage) {
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    tg.showAlert(`✅ ${successMessage}`);
                } else {
                    tg.showAlert(`❌ ማስቀመጥ አልተቻለም።`);
                }
            } catch (error) {
                tg.showAlert(`🚨 መገናኘት አልተቻለም፦ ${error}`);
            }
        }
    </script>
</body>
</html>
