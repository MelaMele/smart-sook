<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ስማርት ሱቅ ማስተዳደሪያ (ባለሱቅ ገጽ)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-slate-50 font-sans p-4 pb-12">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-6 border border-slate-100 space-y-6">
        
        <div class="text-center">
            <h2 class="text-xl font-bold text-slate-800">ስማርት ሱቅ ማስተዳደሪያ 🛍️</h2>
            <p class="text-xs text-slate-500 mt-1">እቃዎችን፣ ማከማቻን፣ ዱቤንና ፋይናንስን በአንድ ቦታ ይቆጣጠሩ</p>
        </div>

        <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
            <label class="block text-xs font-bold text-amber-800 uppercase tracking-wider">የሱቅዎ / የማከፋፈያዎ ስም</label>
            <input type="text" id="global_shop_name" placeholder="ለምሳሌ፦ አቤል ሸቀጣሸቀጥ" class="w-full mt-1 p-2.5 border border-amber-300 rounded-lg outline-none bg-white text-sm font-semibold text-slate-800 shadow-sm">
            <p class="text-[11px] text-amber-600 mt-1">💡 እዚህ ላይ የሚፅፉት ስም ዕቃ ሲመዘግቡ በራስ-ሰር አብሮ ይላካ.</p>
        </div>

        <div class="flex bg-slate-100 p-1 rounded-xl text-xs font-bold">
            <button onclick="switchTab('product-tab')" id="btn-product-tab" class="tab-btn flex-1 py-2 rounded-lg text-center bg-white text-slate-800 shadow-sm">📦 ዕቃ መዝግብ</button>
            <button onclick="switchTab('transfer-tab')" id="btn-transfer-tab" class="tab-btn flex-1 py-2 rounded-lg text-center text-slate-600">⛨ ማስተላለፊያ</button>
            <button onclick="switchTab('credit-tab')" id="btn-credit-tab" class="tab-btn flex-1 py-2 rounded-lg text-center text-slate-600">📝 ዱቤ</button>
            <button onclick="switchTab('finance-tab')" id="btn-finance-tab" class="tab-btn flex-1 py-2 rounded-lg text-center text-slate-600">💰 ወጪ/ገቢ</button>
        </div>

        <div id="product-tab" class="tab-content space-y-4">
            <h4 class="text-sm font-bold text-slate-700">📦 አዲስ ምርት ወደ ማከማቻ ክፍል መመዝገቢያ</h4>
            <form id="productForm" class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-600">የምርት ስም</label>
                    <input type="text" id="p_name" required class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600">ብዛት (Quantity)</label>
                        <input type="number" id="p_qty" required class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600">ባርኮድ (Barcode)</label>
                        <input type="text" id="p_barcode" placeholder="ይንኩና ባርኮድ ይቃኙ" class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600">የመግዣ ዋጋ (Buying)</label>
                        <input type="number" step="0.01" id="p_buying" required class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600">የመሸጫ ዋጋ (Selling)</label>
                        <input type="number" step="0.01" id="p_selling" required class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600">የአገልግሎት ማብቂያ ቀን (Expiry)</label>
                    <input type="date" id="p_expiry" required class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 rounded-lg text-sm mt-2 shadow-md">💾 ምርቱን አስቀምጥ</button>
            </form>
        </div>

        <div id="transfer-tab" class="tab-content hidden space-y-4">
            <h4 class="text-sm font-bold text-slate-700">⛨ ዕቃ ከማከማቻ (Store) ወደ መደርደሪያ (Shelf) ማዛወሪያ</h4>
            <form id="transferForm" class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-600">የምርት ስም</label>
                    <input type="text" id="t_name" required class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600">የሚዛወር ብዛት</label>
                    <input type="number" id="t_qty" required class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg text-sm mt-2 shadow-md">🔄 ማዛወር ፈጽም</button>
            </form>
        </div>

        <div id="credit-tab" class="tab-content hidden space-y-4">
            <h4 class="text-sm font-bold text-slate-700">📝 አዲስ የደንበኛ የዱቤ ዕዳ መመዝገቢያ</h4>
            <form id="creditForm" class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-600">የደንበኛ ሙሉ ስም</label>
                    <input type="text" id="c_name" required class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600">የዕዳ መጠን (በብር)</label>
                    <input type="number" step="0.01" id="c_debt" required class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600">የስልክ ቁጥር (ካለው)</label>
                    <input type="tel" id="c_phone" class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                </div>
                <button type="submit" class="w-full bg-rose-600 text-white font-bold py-3 rounded-lg text-sm mt-2 shadow-md">📌 ዱቤ መዝግብ</button>
            </form>
        </div>

        <div id="finance-tab" class="tab-content hidden space-y-4">
            <h4 class="text-sm font-bold text-slate-700">💰 የዕለት ገቢ እና ወጪ መመዝገቢያ</h4>
            <form id="financeForm" class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-600">የመዝገብ አይነት</label>
                    <select id="f_type" class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none bg-white">
                        <option value="income">📥 ገቢ (Income)</option>
                        <option value="expense">📤 ወጪ (Expense)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600">የገንዘብ መጠን (በብር)</label>
                    <input type="number" step="0.01" id="f_amount" required class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600">ዝርዝር መግለጫ</label>
                    <input type="text" id="f_desc" placeholder="ለምሳሌ፦ የቤት ኪራይ ክፍያ ወይም የሳሙና ሽያጭ" required class="w-full mt-1 p-2.5 border border-slate-200 rounded-lg text-sm outline-none">
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg text-sm mt-2 shadow-md">📊 ሂሳብ መዝግብ</button>
            </form>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 🔄 የሱቅ ስም በስልኩ ላይ ሴቭ የማድረጊያ ሎጂክ
        const shopInput = document.getElementById('global_shop_name');
        
        if(localStorage.getItem('saved_shop_name')) {
            shopInput.value = localStorage.getItem('saved_shop_name');
        } else {
            shopInput.value = "የሰፈር ውጥ ሱቅ";
        }

        shopInput.addEventListener('input', () => {
            localStorage.setItem('saved_shop_name', shopInput.value);
        });

        function getShopName() {
            return shopInput.value.trim() || "የሰፈር ውጥ ሱቅ";
        }

        // TAB SWITCHER FUNCTION
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
                el.classList.add('text-slate-600');
            });
            
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.classList.remove('text-slate-600');
            activeBtn.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
        }

        // 📷 💡 ቴሌግራም ላይ ባርኮድ ስካነር ለመክፈት የተዘጋጀ ሎጂክ
        const barcodeInput = document.getElementById('p_barcode');
        barcodeInput.addEventListener('click', () => {
            if (tg.showScanQrPopup) {
                tg.showScanQrPopup({ text: "እባክዎ የምርቱን ባርኮድ ያንብቡ" }, function(text) {
                    barcodeInput.value = text;
                    tg.closeScanQrPopup();
                    return true;
                });
            } else {
                console.log("ባርኮድ ስካነር የሚሰራው በቴሌግራም አፕ ውስጥ ብቻ ነው።");
            }
        });

        // SUBMIT PRODUCT
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('p_name').value,
                quantity: parseInt(document.getElementById('p_qty').value),
                barcode: document.getElementById('p_barcode').value || null,
                buying_price: parseFloat(document.getElementById('p_buying').value),
                selling_price: parseFloat(document.getElementById('p_selling').value),
                expiry_date: document.getElementById('p_expiry').value,
                shop_name: getShopName()
            };
            await sendData('/api/products', data, "ምርቱ በተሳካ ሁኔታ ተመዝግቧል!");
            document.getElementById('productForm').reset();
        });

        // SUBMIT TRANSFER
        document.getElementById('transferForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                product_name: document.getElementById('t_name').value,
                quantity: parseInt(document.getElementById('t_qty').value),
                shop_name: getShopName()
            };
            await sendData('/api/transfer', data, "ዕቃው ወደ መደርደሪያ ተዛውሯል!");
            document.getElementById('transferForm').reset();
        });

        // SUBMIT CREDIT
        document.getElementById('creditForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                customer_name: document.getElementById('c_name').value,
                total_debt: parseFloat(document.getElementById('c_debt').value),
                phone_number: document.getElementById('c_phone').value || null,
                shop_name: getShopName()
            };
            await sendData('/api/credit', data, "የዱቤ ዕዳው ተመዝግቧል!");
            document.getElementById('creditForm').reset();
        });

        // SUBMIT FINANCE
        document.getElementById('financeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                type: document.getElementById('f_type').value,
                amount: parseFloat(document.getElementById('f_amount').value),
                description: document.getElementById('f_desc').value,
                shop_name: getShopName()
            };
            await sendData('/api/finance', data, "የሂሳብ መዝገቡ ጸድቋል!");
            document.getElementById('financeForm').reset();
        });

        // UNIVERSAL FETCH POST FUNCTION
        async function sendData(endpoint, payload, successMessage) {
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.status === "success" || response.ok) {
                    tg.showAlert(`✅ ${successMessage}`);
                } else {
                    tg.showAlert(`❌ ስህተት፦ ${result.message || "ማስቀመጥ አልተቻለም"}`);
                }
            } catch (error) {
                tg.showAlert(`🚨 መገናኘት አልተቻለም፦ ${error}`);
            }
        }
    </script>
</body>
</html>
