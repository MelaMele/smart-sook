<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ስማርት ሱቅ ማስተዳደሪያ (ባለሱቅ ገጽ)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-slate-50 font-sans p-4 pb-12">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-6 border border-slate-100 space-y-6">
        
        <div class="text-center">
            <h2 id="shop-title-header" class="text-xl font-bold text-slate-800">ስማርት ሱቅ ማስተዳደሪያ 🛍️</h2>
            <p class="text-xs text-slate-500 mt-1">ምርቶች፣ ማከማቻ፣ ዱቤ እና ዕለት ሂሳብ መቆጣጠሪያ</p>
        </div>

        <div class="flex bg-slate-100 p-1 rounded-xl text-xs font-bold">
            <button onclick="switchTab('product-tab')" id="btn-product-tab" class="tab-btn flex-1 py-2 rounded-lg text-center bg-white text-slate-800 shadow-sm cursor-pointer">📦 መዝግብ</button>
            <button onclick="switchTab('transfer-tab')" id="btn-transfer-tab" class="tab-btn flex-1 py-2 rounded-lg text-center text-slate-600 cursor-pointer">⛨ አዛውር</button>
            <button onclick="switchTab('credit-tab')" id="btn-credit-tab" class="tab-btn flex-1 py-2 rounded-lg text-center text-slate-600 cursor-pointer">📝 ዱቤ</button>
            <button onclick="switchTab('finance-tab')" id="btn-finance-tab" class="tab-btn flex-1 py-2 rounded-lg text-center text-slate-600 cursor-pointer">💰 ሂሳብ</button>
        </div>

        <div class="bg-white rounded-2xl p-2 min-h-[280px]">
            <div id="product-tab" class="tab-content space-y-3">
                <h4 class="text-xs font-bold text-slate-400 uppercase">📦 አዲስ ምርት መመዝገቢያ</h4>
                <form id="productForm" class="space-y-3">
                    <input type="text" id="p_name" placeholder="የምርት ስም" required class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="p_qty" placeholder="ብዛት" required class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        <input type="text" id="p_barcode" placeholder="ባርኮድ (ለመቃኘት ይንኩ)" class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" step="0.01" id="p_buying" placeholder="የመግዣ ዋጋ" required class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        <input type="number" step="0.01" id="p_selling" placeholder="የመሸጫ ዋጋ" required class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                    </div>
                    <input type="date" id="p_expiry" required class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50 text-slate-400">
                    <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl text-sm shadow-md hover:bg-slate-800 transition cursor-pointer">💾 አስቀምጥ</button>
                </form>
            </div>

            <div id="transfer-tab" class="tab-content hidden space-y-3">
                <h4 class="text-xs font-bold text-slate-400 uppercase">⛨ ወደ መደርደሪያ ማዛወሪያ</h4>
                <form id="transferForm" class="space-y-3">
                    <input type="text" id="t_name" placeholder="የምርት ስም" required class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                    <input type="number" id="t_qty" placeholder="የሚዛወር ብዛት" required class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl text-sm shadow-md hover:bg-indigo-500 transition cursor-pointer">🔄 ማዛወር ፈጽም</button>
                </form>
            </div>

            <div id="credit-tab" class="tab-content hidden space-y-3">
                <h4 class="text-xs font-bold text-slate-400 uppercase">📝 የደንበኛ ዱቤ መመዝገቢያ</h4>
                <form id="creditForm" class="space-y-3">
                    <input type="text" id="c_name" placeholder="የደንበኛ ሙሉ ስም" required class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                    <input type="number" step="0.01" id="c_debt" placeholder="የዕዳ መጠን (በብር)" required class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                    <input type="tel" id="c_phone" placeholder="የስልክ ቁጥር" class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                    <button type="submit" class="w-full bg-rose-600 text-white font-bold py-3.5 rounded-xl text-sm shadow-md hover:bg-rose-500 transition cursor-pointer">📌 ዱቤ መዝግብ</button>
                </form>
            </div>

            <div id="finance-tab" class="tab-content hidden space-y-3">
                <h4 class="text-xs font-bold text-slate-400 uppercase">💰 የዕለት ገቢ እና ወጪ</h4>
                <form id="financeForm" class="space-y-3">
                    <select id="f_type" class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                        <option value="income">📥 ገቢ (Income)</option>
                        <option value="expense">📤 ወጪ (Expense)</option>
                    </select>
                    <input type="number" step="0.01" id="f_amount" placeholder="የገንዘብ መጠን" required class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                    <input type="text" id="f_desc" placeholder="ዝርዝር መግለጫ" required class="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none bg-slate-50">
                    <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl text-sm shadow-md hover:bg-emerald-500 transition cursor-pointer">📊 ሂሳብ መዝግብ</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 🔗 ቦቱ ካረጋገጠ በኋላ በሊንክ የላከውን የሱቅ ስም በራስ-ሰር መፈለጊያ ሎጂክ
        const urlParams = new URLSearchParams(window.location.search);
        const shopName = urlParams.get('shop') || "የሰፈር ውጥ ሱቅ";

        // የገጹን ርዕስ መቀየር
        document.getElementById('shop-title-header').innerText = `${shopName.replace('_', ' ')} 🏢`;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
                el.classList.add('text-slate-600');
            });
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.classList.remove('text-slate-600');
            activeBtn.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
        }

        // 📷 BARCODE SCANNER
        const barcodeInput = document.getElementById('p_barcode');
        barcodeInput.addEventListener('click', () => {
            if (tg.showScanQrPopup) {
                tg.showScanQrPopup({ text: "እባክዎ የምርቱን ባርኮድ ያንብቡ" }, function(text) {
                    barcodeInput.value = text;
                    tg.closeScanQrPopup();
                    return true;
                });
            }
        });

        // SUBMIT FORMS
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('p_name').value,
                quantity: parseInt(document.getElementById('p_qty').value),
                barcode: document.getElementById('p_barcode').value || null,
                buying_price: parseFloat(document.getElementById('p_buying').value),
                selling_price: parseFloat(document.getElementById('p_selling').value),
                expiry_date: document.getElementById('p_expiry').value,
                shop_name: shopName
            };
            await sendData('/api/products', data, "ምርቱ በተሳካ ሁኔታ ተመዝግቧል!");
            document.getElementById('productForm').reset();
        });

        document.getElementById('transferForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                product_name: document.getElementById('t_name').value,
                quantity: parseInt(document.getElementById('t_qty').value),
                shop_name: shopName
            };
            await sendData('/api/transfer', data, "ዕቃው ወደ መደርደሪያ ተዛውሯል!");
            document.getElementById('transferForm').reset();
        });

        document.getElementById('creditForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                customer_name: document.getElementById('c_name').value,
                total_debt: parseFloat(document.getElementById('c_debt').value),
                phone_number: document.getElementById('c_phone').value || null,
                shop_name: shopName
            };
            await sendData('/api/credit', data, "የዱቤ ዕዳው ተመዝግቧል!");
            document.getElementById('creditForm').reset();
        });

        document.getElementById('financeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                type: document.getElementById('f_type').value,
                amount: parseFloat(document.getElementById('f_amount').value),
                description: document.getElementById('f_desc').value,
                shop_name: shopName
            };
            await sendData('/api/finance', data, "የሂሳብ መዝገቡ ጸድቋል!");
            document.getElementById('financeForm').reset();
        });

        async function sendData(endpoint, payload, successMessage) {
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    tg.showAlert(`✅ ${successMessage}`);
                } else {
                    tg.showAlert(`❌ ማስቀመጥ አልተቻለም።`);
                }
            } catch (error) {
                tg.showAlert(`🚨 መገናኘት አልተቻለም፦ ${error}`);
            }
        }
    </script>
</body>
</html>
