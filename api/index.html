<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ስማርት ሱቅ ማስተዳደሪያ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-100 font-sans p-4">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-6">
        <div class="flex flex-wrap justify-between border-b border-gray-200 mb-6 pb-2 text-xs font-semibold gap-y-2">
            <button onclick="switchTab('tab-product')" id="btn-product" class="text-blue-600 border-b-2 border-blue-600 pb-1 w-[22%]">📦 ዕቃ መዝግብ</button>
            <button onclick="switchTab('tab-transfer')" id="btn-transfer" class="text-gray-500 pb-1 w-[22%]">🔄 ዕቃ አዛውር</button>
            <button onclick="switchTab('tab-credit')" id="btn-credit" class="text-gray-500 pb-1 w-[22%]">📝 ዱቤ መዝግብ</button>
            <button onclick="switchTab('tab-finance')" id="btn-finance" class="text-gray-500 pb-1 w-[22%]">💰 ቀን ሂሳብ</button>
        </div>

        <div id="tab-product" class="tab-content">
            <h3 class="text-xl font-bold text-gray-800 mb-4 text-center">አዲስ ዕቃ መዝግብ</h3>
            <form id="productForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">የዕቃው ስም</label>
                    <input type="text" id="name" required class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">ብዛት (ማከማቻ)</label>
                        <input type="number" id="quantity" required class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">ባርኮድ (ካለ)</label>
                        <input type="text" id="barcode" class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">የተገዛበት ዋጋ</label>
                        <input type="number" step="0.01" id="buying_price" required class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">የሚሸጥበት ዋጋ</label>
                        <input type="number" step="0.01" id="selling_price" required class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">የአገልግሎት ማብቂያ ቀን (Expiry)</label>
                    <input type="date" id="expiry_date" required class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg">💾 አስቀምጥ</button>
            </form>
        </div>

        <div id="tab-transfer" class="tab-content hidden">
            <h3 class="text-xl font-bold text-gray-800 mb-4 text-center">🔄 ዕቃ ከማከማቻ ወደ ሱቅ ማዘዋወሪያ</h3>
            <form id="transferForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">የዕቃው ስም</label>
                    <input type="text" id="t_name" required class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none" placeholder="ለምሳሌ፦ ሳሙና">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">የሚዛወር ብዛት (Quantity)</label>
                    <input type="number" id="t_quantity" required class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none">
                </div>
                <button type="submit" class="w-full bg-amber-500 text-white font-bold py-3 rounded-xl shadow-lg">🚀 አዛውር</button>
            </form>
        </div>

        <div id="tab-credit" class="tab-content hidden">
            <h3 class="text-xl font-bold text-gray-800 mb-4 text-center">📝 አዲስ የዱቤ ዕዳ መዝግብ</h3>
            <form id="creditForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">የደንበኛ ስም</label>
                    <input type="text" id="c_name" required class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">የዱቤ መጠን (ብር)</label>
                    <input type="number" step="0.01" id="c_amount" required class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">ስልክ ቁጥር (ካለ)</label>
                    <input type="text" id="c_phone" class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none">
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg">✍️ የዱቤ መዝገብ አስቀምጥ</button>
            </form>
        </div>

        <div id="tab-finance" class="tab-content hidden">
            <h3 class="text-xl font-bold text-gray-800 mb-4 text-center">💰 የዕለት ሂሳብ መመዝገቢያ</h3>
            <form id="financeForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">የመዝገብ አይነት</label>
                    <select id="f_type" class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none bg-white">
                        <option value="income">📥 ገቢ (የዕቃ ሽያጭ / ሌላ ገቢ)</option>
                        <option value="expense">📤 ወጪ (ሱቅ ኪራይ / ዕቃ መግዣ / ሌላ ወጪ)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">የገንዘብ መጠን (ብር)</label>
                    <input type="number" step="0.01" id="f_amount" required class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">ማብራሪያ (ማስታወሻ)</label>
                    <input type="text" id="f_description" placeholder="ለምሳሌ፦ የዛሬ የሳሙና ሽያጭ" required class="w-full mt-1 p-3 border border-gray-300 rounded-xl outline-none">
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg">💵 ሂሳብ መዝግብ</button>
            </form>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            
            document.querySelectorAll('div button').forEach(el => {
                el.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
                el.classList.add('text-gray-500');
            });
            
            const activeBtn = tabId.replace('tab-', 'btn-');
            document.getElementById(activeBtn).classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                quantity: parseInt(document.getElementById('quantity').value),
                barcode: document.getElementById('barcode').value || null,
                buying_price: parseFloat(document.getElementById('buying_price').value),
                selling_price: parseFloat(document.getElementById('selling_price').value),
                expiry_date: document.getElementById('expiry_date').value
            };
            sendData('/api/products', data, "ዕቃው በማከማቻ ክፍል ተመዝግቧል!");
        });

        document.getElementById('transferForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                product_name: document.getElementById('t_name').value,
                quantity: parseInt(document.getElementById('t_quantity').value)
            };
            sendData('/api/transfer', data, "ዕቃው ወደ ሱቅ መደርደሪያ ተዛውሯል!");
        });

        document.getElementById('creditForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                customer_name: document.getElementById('c_name').value,
                total_debt: parseFloat(document.getElementById('c_amount').value),
                phone_number: document.getElementById('c_phone').value || null
            };
            sendData('/api/credit', data, "የዱቤ መዝገቡ በተሳካ ሁኔታ ተቀምጧል!");
        });

        // 4. የፋይናንስ መዝገብ መላኪያ
        document.getElementById('financeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                type: document.getElementById('f_type').value,
                amount: parseFloat(document.getElementById('f_amount').value),
                description: document.getElementById('f_description').value
            };
            sendData('/api/finance', data, "የፋይናንስ መረጃው በተሳካ ሁኔታ ተመዝግቧል!");
        });

        async function sendData(url, bodyData, successMsg) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                if (response.ok) {
                    tg.showAlert("🎯 " + successMsg);
                    tg.close();
                } else {
                    tg.showAlert("❌ ስህተት ተፈጥሯል፣ እባክዎ መረጃውን ያረጋግጡ።");
                }
            } catch (error) {
                tg.showAlert("🚨 ስህተት፦ " + error);
            }
        }
    </script>
</body>
</html>
