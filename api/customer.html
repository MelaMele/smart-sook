<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Sook - የደንበኛ ማዘዣ ገፅ</title>
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #3b82f6;
            --background: #f0fdf4;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--background); color: var(--text); padding: 15px; }
        .wrapper { max-width: 500px; margin: 20px auto; background: var(--surface); padding: 25px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        h1 { font-size: 22px; text-align: center; margin-bottom: 20px; color: var(--primary-dark); }
        .section-box { border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 20px; background: #fafafa; }
        h2 { font-size: 15px; margin-bottom: 12px; color: #475569; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 13px; font-weight: 600; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
        input:focus, textarea:focus { border-color: var(--primary); }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--primary-dark); }
        .btn-blue { background: var(--secondary); }
        .btn-blue:hover { background: #2563eb; }
        .result-badge { margin-top: 10px; padding: 10px; background: #e0f2fe; color: #0369a1; border-radius: 6px; font-weight: bold; text-align: center; font-size: 15px; }
        .status-msg { margin-top: 10px; text-align: center; font-size: 13px; font-weight: 500; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>🛒 የደንበኞች ማዘዣና እዳ መመልከቻ</h1>
    
    <!-- Check Debt Section -->
    <div class="section-box">
        <h2>💳 የዱቤ እዳዎን እዚህ ያረጋግጡ</h2>
        <div class="form-group">
            <label>የእርስዎ ሙሉ ስም</label>
            <input type="text" id="checkName" placeholder="ለምሳሌ፡ አበባው ከበደ">
        </div>
        <button class="btn-blue" onclick="checkDebt()">እዳ ፈልግ</button>
        <div id="debtResult" class="hidden result-badge"></div>
    </div>

    <!-- Place Order Section -->
    <div class="section-box">
        <h2>🛍️ አዲስ ትዕዛዝ ይላኩ</h2>
        <div class="form-group">
            <label>ስምዎ</label>
            <input type="text" id="o_customer" placeholder="ሙሉ ስምዎ">
        </div>
        <div class="form-group">
            <label>የቴሌግራም መለያ ቁጥር (Telegram ID)</label>
            <input type="text" id="o_telegram" placeholder="የእርስዎን Telegram ID ያስገቡ">
        </div>
        <div class="form-group">
            <label>የሚፈልጉት ዕቃ ስም</label>
            <input type="text" id="o_product" placeholder="ለምሳሌ፡ ባለ 5 ሊትር ዘይት">
        </div>
        <div class="form-group">
            <label>ብዛት</label>
            <input type="number" id="o_qty" value="1" min="1">
        </div>
        <div class="form-group">
            <label>ተጨማሪ ማስታወሻ (ከተፈለገ)</label>
            <textarea id="o_note" rows="2" placeholder="ለምሳሌ፡ ጥዋት 2 ሰዓት ላይ ይምጣልኝ..."></textarea>
        </div>
        <button onclick="sendOrder()">ትዕዛዝ አስተላልፍ</button>
        <div id="orderStatus" class="status-msg"></div>
    </div>
</div>

<script>
    async function checkDebt() {
        const name = document.getElementById('checkName').value.trim();
        if(!name) return alert('እባክዎ ስም ያስገቡ!');
        try {
            const res = await fetch(`/api/customer/debt?name=${encodeURIComponent(name)}`);
            const data = await res.json();
            const resultBox = document.getElementById('debtResult');
            resultBox.classList.remove('hidden');
            if(data.status === 'success') { resultBox.innerText = `የአሁኑ እዳዎ፡ ${data.debt} ብር`; }
            else { resultBox.innerText = 'መረጃውን ማግኘት አልተቻለም!'; }
        } catch(e) { alert('ስህተት አጋጥሟል!'); }
    }

    async function sendOrder() {
        const data = {
            customer_name: document.getElementById('o_customer').value.trim(),
            telegram_id: document.getElementById('o_telegram').value.trim(),
            product_name: document.getElementById('o_product').value.trim(),
            quantity: parseInt(document.getElementById('o_qty').value),
            note: document.getElementById('o_note').value.trim()
        };
        if(!data.customer_name || !data.telegram_id || !data.product_name) return alert('እባክዎ አስፈላጊዎቹን ይሙሉ!');

        try {
            const res = await fetch('/api/customer/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            const statusBox = document.getElementById('orderStatus');
            if(res.ok && result.status === 'success') {
                statusBox.style.color = 'green';
                statusBox.innerText = '🛍️ ትዕዛዝዎ በተሳካ ሁኔታ ደርሷል!';
                document.getElementById('o_product').value = ''; document.getElementById('o_note').value = '';
            } else { statusBox.style.color = 'red'; statusBox.innerText = result.detail || 'ስህተት!'; }
        } catch(e) { document.getElementById('orderStatus').innerText = 'የኔትወርክ ስህተት!'; }
    }
</script>
</body>
</html>
